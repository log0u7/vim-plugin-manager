# .github/workflows/release.yml - Publish GitHub Release on tag push
# Maintainer: G.K.E. <gke@6admin.io>
# Version: 1.5.0

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Make + Git
        run: sudo apt-get update && sudo apt-get install -y git make

      - name: Build archive
        run: make archive VERSION=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vim-plugin-manager-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
