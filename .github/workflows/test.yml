name: vader tests

on: [push, pull_request]

jobs:
  # --------------------------------------------------------------------------
  # Lint: VimScript static analysis via vim-vint
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install vim-vint
        run: pip install vim-vint

      - name: Run vint
        run: vint -e autoload/ plugin/ ftplugin/ ftdetect/ syntax/

  # --------------------------------------------------------------------------
  # Tests: Vader suite on a single up-to-date Ubuntu image
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Vim + Make
        run: sudo apt-get update && sudo apt-get install -y git vim make

      - name: Verify Vim version and features
        run: |
          vim -es -c 'if v:version < 802 | cq | endif' -c q \
            && echo "Vim >= 8.2 OK" || { echo "Vim >= 8.2 required"; exit 1; }
          vim -es -c 'if !has("job") || !has("channel") | cq | endif' -c q \
            && echo "+job +channel OK" || { echo "+job and +channel required"; exit 1; }

      - name: Restore cached Vader.vim
        id: cache-vader
        uses: actions/cache@v5
        with:
          path: vader.vim
          key: vader-429b669e6158be3a9fc110799607c232e6ed8e29

      - name: Clone Vader.vim
        if: steps.cache-vader.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/junegunn/vader.vim.git
          git -C vader.vim checkout 429b669e6158be3a9fc110799607c232e6ed8e29

      - name: Run Tests
        run: make test-ci
