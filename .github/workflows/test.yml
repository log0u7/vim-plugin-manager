name: vader tests

on: [push, pull_request]

jobs:
  # --------------------------------------------------------------------------
  # Lint: VimScript static analysis via vim-vint
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install vim-vint
        run: pip install vim-vint

      - name: Run vint
        run: vint -e autoload/ plugin/ ftplugin/ ftdetect/ syntax/

  # --------------------------------------------------------------------------
  # Tests: Vader suite across a matrix of Linux distributions.
  #
  # Distribution matrix and the Vim version each ships:
  #   almalinux:9       Vim 8.2.2637  (RHEL 9 proxy - the real 8.2 floor)
  #   almalinux:10      Vim 9.1.083   (RHEL 10 proxy)
  #   debian:bookworm   Vim 9.0.1378  (Debian oldstable)
  #   debian:trixie     Vim 9.1.1230  (Debian stable)
  #   ubuntu:24.04      Vim 9.1.0016
  #   ubuntu:26.04      Vim 9.1.2141
  #   archlinux:latest  Vim 9.2.0735  (rolling, the ceiling)
  #
  # The AlmaLinux 9 job runs on Vim 8.2 and proves the floor is respected.
  # Keep VADER_SHA in sync with Makefile and .gitlab-ci.yml.
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "almalinux:9"
            install: "dnf install -y git make vim-enhanced python3-pip"
          - image: "almalinux:10"
            install: "dnf install -y git make vim-enhanced python3-pip"
          - image: "debian:bookworm"
            install: "apt-get update && apt-get install -y git make vim python3-pip"
          - image: "debian:trixie"
            install: "apt-get update && apt-get install -y git make vim python3-pip"
          - image: "ubuntu:24.04"
            install: "apt-get update && apt-get install -y git make vim python3-pip"
          - image: "ubuntu:26.04"
            install: "apt-get update && apt-get install -y git make vim python3-pip"
          - image: "archlinux:latest"
            install: "pacman -Syu --noconfirm git make vim python-pip"

    steps:
      - name: Install system packages
        run: ${{ matrix.install }}

      - uses: actions/checkout@v6

      - name: Verify Vim version and features
        run: |
          vim -es -c 'if v:version < 802 | cq | endif' -c q \
            && echo "Vim >= 8.2 OK" || { echo "Vim >= 8.2 required"; exit 1; }
          vim -es -c 'if !has("job") || !has("channel") | cq | endif' -c q \
            && echo "+job +channel OK" || { echo "+job and +channel required"; exit 1; }

      - name: Restore cached Vader.vim
        id: cache-vader
        uses: actions/cache@v5
        with:
          path: vader.vim
          key: vader-429b669e6158be3a9fc110799607c232e6ed8e29

      - name: Clone Vader.vim
        if: steps.cache-vader.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/junegunn/vader.vim.git
          git -C vader.vim checkout 429b669e6158be3a9fc110799607c232e6ed8e29

      - name: Run Tests
        run: make test-ci

  # --------------------------------------------------------------------------
  # Gentoo: non-blocking job (slow build, USE-flag dependent).
  # A failure here does not block the pipeline.
  # --------------------------------------------------------------------------
  test-gentoo:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container: gentoo/stage3:latest
    continue-on-error: true

    steps:
      - name: Bootstrap Portage and install packages
        run: |
          emerge-webrsync
          emerge --getbinpkg --quiet-build app-editors/vim dev-vcs/git dev-build/make

      - uses: actions/checkout@v6

      - name: Verify Vim version and features
        run: |
          vim -es -c 'if v:version < 802 | cq | endif' -c q \
            && echo "Vim >= 8.2 OK" || { echo "Vim >= 8.2 required"; exit 1; }
          vim -es -c 'if !has("job") || !has("channel") | cq | endif' -c q \
            && echo "+job +channel OK" || { echo "+job and +channel required"; exit 1; }

      - name: Clone Vader.vim
        run: |
          git clone https://github.com/junegunn/vader.vim.git
          git -C vader.vim checkout 429b669e6158be3a9fc110799607c232e6ed8e29

      - name: Run Tests
        run: make test-ci

  # --------------------------------------------------------------------------
  # Async smoke: exercise the real async job path under a pty so Vim's
  # event loop runs and job callbacks are actually delivered.
  # Runs on the same distribution matrix as the main test job.
  # Uses util-linux 'script' to allocate a pty.
  # --------------------------------------------------------------------------
  test-async:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: "almalinux:9",      install: "dnf install -y git make vim-enhanced util-linux" }
          - { image: "almalinux:10",     install: "dnf install -y git make vim-enhanced util-linux" }
          - { image: "debian:bookworm",  install: "apt-get update && apt-get install -y git make vim bsdutils" }
          - { image: "debian:trixie",    install: "apt-get update && apt-get install -y git make vim bsdutils" }
          - { image: "ubuntu:24.04",     install: "apt-get update && apt-get install -y git make vim bsdutils" }
          - { image: "ubuntu:26.04",     install: "apt-get update && apt-get install -y git make vim bsdutils" }
          - { image: "archlinux:latest", install: "pacman -Syu --noconfirm git make vim util-linux" }

    steps:
      - name: Install system packages
        run: ${{ matrix.install }}

      - uses: actions/checkout@v6

      - name: Verify +job and +channel
        run: |
          vim -es -c 'if !has("job") || !has("channel") | cq | endif' -c q \
            && echo "+job +channel OK" || { echo "+job and +channel required"; exit 1; }

      - name: Run async smoke test (pty)
        run: make test-async
